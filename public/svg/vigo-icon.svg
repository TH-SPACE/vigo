<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- fundo roxo com cantos arredondados -->
  <rect width="512" height="512" rx="88" fill="#660099"/>

  <!-- brilho suave no topo -->
  <ellipse cx="256" cy="80" rx="210" ry="72" fill="#ffffff" fill-opacity="0.07"/>

  <!-- raio (lightning bolt) centralizado na metade superior -->
  <!-- corpo principal branco -->
  <polygon
    points="296,52 158,272 238,272 198,430 356,208 272,208 312,52"
    fill="#ffffff"/>
  <!-- ponta inferior em rosa -->
  <polygon
    points="238,272 198,430 290,290 238,290"
    fill="#e4007c"/>

  <!-- texto VIGO na base -->
  <text
    x="256"
    y="484"
    text-anchor="middle"
    font-family="'Arial Black','Arial',sans-serif"
    font-weight="900"
    font-size="118"
    letter-spacing="6"
    fill="#ffffff">VIGO</text>

  <!-- linha rosa fina acima do texto -->
  <rect x="88" y="438" width="336" height="6" rx="3" fill="#e4007c" fill-opacity="0.7"/>
</svg>
